<html lang="en">
<head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #312e81
    );
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:400px;
    height:400px;
    background:#4f46e5;
    border-radius:50%;
    top:-150px;
    left:-100px;
    filter:blur(120px);
    opacity:.5;
}

body::after{
    content:'';
    position:fixed;
    width:350px;
    height:350px;
    background:#06b6d4;
    border-radius:50%;
    bottom:-120px;
    right:-100px;
    filter:blur(120px);
    opacity:.4;
}

h1{
    color:#fff;
    font-size:4rem;
    margin-bottom:30px;
    text-transform:uppercase;
    letter-spacing:4px;
    text-shadow:
    0 0 20px rgba(99,102,241,.8),
    0 0 40px rgba(99,102,241,.5);
}

form{
    width:100%;
    max-width:700px;
    padding:30px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
    0 10px 40px rgba(0,0,0,.3),
    inset 0 0 20px rgba(255,255,255,.05);
    display:flex;
    flex-direction:column;
    gap:18px;
}

input[type="text"]{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    border:1px solid rgba(255,255,255,0.15);
    transition:.4s;
}

input[type="text"]::placeholder{
    color:#cbd5e1;
}

input[type="text"]:focus{
    outline:none;
    transform:scale(1.02);
    border-color:#60a5fa;
    box-shadow:
    0 0 20px rgba(96,165,250,.5);
}

input[type="submit"]{
    padding:18px;
    border:none;
    border-radius:15px;
    background:linear-gradient(
    45deg,
    #6366f1,
    #06b6d4
    );
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.4s;
}

input[type="submit"]:hover{
    transform:translateY(-4px);
    box-shadow:
    0 10px 30px rgba(99,102,241,.6);
}

ul{
    width:100%;
    max-width:700px;
    list-style:none;
    margin-top:35px;
}

li{
    margin-bottom:20px;
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    color:white;
    transition:.4s;
    position:relative;
    overflow:hidden;
}

li::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:5px;
    height:100%;
    background:linear-gradient(
    #6366f1,
    #06b6d4
    );
}

li:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:
    0 15px 35px rgba(0,0,0,.4);
}

li h2{
    font-size:1.5rem;
    margin-bottom:10px;
    color:#ffffff;
}

li p{
    color:#cbd5e1;
    line-height:1.6;
}

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#6366f1;
    border-radius:20px;
}

@media(max-width:768px){

    h1{
        font-size:2.5rem;
    }

    form,
    ul{
        width:95%;
    }
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TODO APP</h1>
    {{todos}}
    <form action="/add" method="post">
        <input type="text" name="todo">
        <input type="text" name="des">
        <input type="submit">
    </form>

    <ul>
        {% for i in todos%}
        <li>
            <h2>{{i,get('todo')}}</h2>
            <p>{{i.get('des')}}</p>
        </li>
        {% endfor %}
    </ul>
    
</body>
</html>
